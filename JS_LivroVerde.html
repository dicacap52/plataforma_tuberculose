<script>
  function inicializarMesesVerde() {
    const container = document.getElementById('containerMeses');
    container.innerHTML = '';
    for (let i = 1; i <= 12; i++) {
      container.innerHTML += '<input type="text" id="mes' + i + '" placeholder="Mês ' + i + '" class="form-input campo-livro-verde" disabled>';
    }
    gerenciadoresLivros['Livro Verde - Tratamento'].init();
  }

  function aplicarMesesVerde(dados, preenchidos, modo) {
    for (let i = 1; i <= 12; i++) {
      const id = 'mes' + i;
      const campo = document.getElementById(id);
      if (!campo) continue;
      const bloqueado = modo === 'novo' ? false : (modo === 'visualizar' ? true : !!preenchidos[id]);
      campo.value = (dados.meses && dados.meses[i - 1]) || '';
      campo.disabled = bloqueado;
      campo.readOnly = false;
      campo.classList.toggle('campo-bloqueado', bloqueado);
    }
  }

  function bloquearMesesVerde() {
    for (let i = 1; i <= 12; i++) {
      const campo = document.getElementById('mes' + i);
      if (!campo) continue;
      campo.value = '';
      campo.disabled = true;
      campo.classList.remove('campo-bloqueado');
    }
  }

  registrarLivro({
    aba: 'Livro Verde - Tratamento',
    idCpf: 'cpf',
    chaveBusca: 'cpf',
    campoSempreEditavel: 'obs',
    qtdMeses: 12,
    idMsgBusca: 'msgBusca',
    idBtnSalvar: 'btnSalvarLivroVerde',
    idModal: 'modalSucessoLivroVerde',
    idModalTitulo: 'modalSucessoTitulo',
    idModalDetalhe: 'modalSucessoDetalhe',
    idModalOk: 'btnModalSucessoOk',
    idModalCancelar: 'btnModalCancelarLivroVerde',
    idModalVisualizar: 'btnModalVisualizarLivroVerde',
    idPrimeiroCampo: 'sinan',
    campos: [
      { id: 'cpf', key: 'cpf' },
      { id: 'sinan', key: 'sinan' },
      { id: 'prontuario', key: 'prontuario' },
      { id: 'nomePaciente', key: 'nomePaciente' },
      { id: 'idade', key: 'idade' },
      { id: 'sexo', key: 'sexo' },
      { id: 'bac1', key: 'bac1' },
      { id: 'bac2', key: 'bac2' },
      { id: 'trm', key: 'trm' },
      { id: 'cultura', key: 'cultura' },
      { id: 'culturaTS', key: 'culturaTS' },
      { id: 'rx', key: 'rx' },
      { id: 'hiv', key: 'hiv' },
      { id: 'formaClinica', key: 'formaClinica' },
      { id: 'tipoEntrada', key: 'tipoEntrada' },
      { id: 'esquema', key: 'esquema' },
      { id: 'dataInicio', key: 'dataInicio' },
      { id: 'tdo', key: 'tdo' },
      { id: 'tarv', key: 'tarv' },
      { id: 'motivoEnc', key: 'motivoEnc' },
      { id: 'dataEnc', key: 'dataEnc' },
      { id: 'contIdent', key: 'contIdent' },
      { id: 'contExam', key: 'contExam' },
      { id: 'obs', key: 'obs' }
    ],
    onAplicarCampos: aplicarMesesVerde,
    onBloquearCampos: bloquearMesesVerde,
    onColetarDados: function(dados) {
      dados.meses = [];
      for (let i = 1; i <= 12; i++) {
        const campo = document.getElementById('mes' + i);
        dados.meses.push(campo ? campo.value : '');
      }
    }
  });

  function inicializarMeses() { inicializarMesesVerde(); }
  function buscarCpfLivroVerde(forcar) { gerenciadoresLivros['Livro Verde - Tratamento'].buscar(forcar); }
  function salvarLivroVerde() { gerenciadoresLivros['Livro Verde - Tratamento'].salvar(); }
  function fecharModalSucessoLivroVerde() { gerenciadoresLivros['Livro Verde - Tratamento'].fecharModal(); }
</script>
