<div id="modalVisualizarLivro" class="modal-visualizar-livro-overlay" style="display:none;" aria-modal="true" role="dialog">
  <div class="modal-visualizar-livro-box">
    <div class="modal-visualizar-livro-cabecalho">
      <div>
        <h2 id="visualizarLivroTitulo" class="modal-visualizar-livro-titulo">Visualizar Livro</h2>
        <p class="modal-visualizar-livro-subtitulo">Somente leitura — dados de identificação ocultos; metadados do registro visíveis</p>
      </div>
      <button id="btnFecharVisualizarLivro" type="button" class="btn-fechar-visualizar-livro" aria-label="Fechar">×</button>
    </div>
    <div id="visualizarLivroConteudo" class="modal-visualizar-livro-conteudo">
      <p class="visualizar-livro-loading">Carregando dados...</p>

    <div class="modal-visualizar-livro-rodape">
      <button id="btnFecharVisualizarLivroRodape" type="button" class="btn-modal-ok-livro-verde">Fechar</button>
    </div>
  </div>
</div>
