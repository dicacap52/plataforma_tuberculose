<script>
  function aplicarMascaraCPF(campo) {
    let v = campo.value;
    v = v.replace(/\D/g, "");
    v = v.replace(/(\d{3})(\d)/, "$1.$2");
    v = v.replace(/(\d{3})(\d)/, "$1.$2");
    v = v.replace(/(\d{3})(\d{1,2})$/, "$1-$2");
    campo.value = v;
  }

  function limparErroLogin() {
    const msg = document.getElementById('msgErro');
    if (!msg) return;
    msg.className = 'feedback-msg';
    msg.textContent = '';
    msg.removeAttribute('style');
  }

  function mostrarErroLogin(html) {
    const msg = document.getElementById('msgErro');
    if (!msg) {
      alert(String(html).replace(/<[^>]*>/g, ' ').replace(/\s+/g, ' ').trim());
      return;
    }
    msg.innerHTML = html;
    msg.className = 'feedback-msg feedback-error';
    msg.removeAttribute('style');
    msg.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  function solicitarAcesso() {
    const cpf = document.getElementById('cpfInput').value;
    const btn = document.getElementById('btnEntrar');

    if (cpf.length !== 14) {
      mostrarErroLogin('Por favor, digite um CPF válido.');
      return;
    }

    limparErroLogin();
    btn.disabled = true;
    btn.textContent = "Validando...";

    google.script.run
      .withSuccessHandler(acessoProcessado)
      .withFailureHandler(erroServidor)
      .validarProfissional(cpf);
  }

  function acessoProcessado(resposta) {
    const btn = document.getElementById('btnEntrar');

    btn.disabled = false;
    btn.textContent = "Entrar no Sistema";

    if (resposta && resposta.sucesso === true) {
      sessaoAtual = resposta;

      document.getElementById('lblNomeUsuario').textContent = resposta.nome;
      document.getElementById('lblFuncao').textContent = resposta.funcao;
      document.getElementById('lblUnidade').textContent = resposta.unidade;

      document.getElementById('telaLogin').style.display = 'none';
      document.getElementById('telaDashboard').style.display = 'block';

      document.getElementById('cpfInput').value = '';
      limparErroLogin();
      return;
    }

    const textoServidor = resposta && resposta.erro ? resposta.erro : '';
    mostrarErroLogin(
      '<strong>⚠️ Cadastro não encontrado!</strong><br><br>' +
      'Não identificamos uma conta associada a este CPF em nosso sistema. ' +
      'Verifique se o CPF foi digitado corretamente ou entre em contato com seu Gestor para solicitar seu cadastro.' +
      (textoServidor ? '<br><br><small>' + textoServidor + '</small>' : '')
    );
  }

  function erroServidor(erro) {
    const btn = document.getElementById('btnEntrar');
    btn.disabled = false;
    btn.textContent = "Entrar no Sistema";
    mostrarErroLogin('Erro de conexão com o servidor. Tente novamente.');
    console.error(erro);
  }
</script>
