<div id="telaDashboard" class="dashboard-layout">

  <!-- CABEÇALHO DO DASHBOARD -->
  <div class="dash-header">
    <div class="user-info">
      <h2>Olá, <span id="lblNomeUsuario"></span></h2>
      <p id="lblFuncao"></p>
      <p id="lblUnidade"></p>
    </div>
    <button class="btn-logout" onclick="encerrarSessao()">Sair do Sistema</button>
  </div>

  <!-- GRADE DE MÓDULOS (LIVROS) -->
  <div class="modules-grid">

    <div class="module-card" onclick="abrirModulo('Livro Verde - Tratamento')">
      <img id="imgLivroVerde" src="" alt="Livro Verde - Registro de Tratamento de TB" loading="lazy">
    </div>

    <div class="module-card" onclick="abrirModulo('Livro Amarelo - Contatos')">
      <img id="imgLivroContatos" src="" alt="Livro Amarelo - Investigação de Contatos" loading="lazy">
    </div>

    <div class="module-card" onclick="abrirModulo('Livro Amarelo - ILTB')">
      <img id="imgLivroIltb" src="" alt="Livro Amarelo ILTB - Infecção Latente por TB" loading="lazy">
    </div>

    <div class="module-card" onclick="abrirModulo('Livro Azul - Sintomático Respiratório')">
      <img id="imgLivroAzul" src="" alt="Livro Azul - Sintomático Respiratório" loading="lazy">
    </div>

  </div>

</div>
