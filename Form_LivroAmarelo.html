<div id="telaLivroAmarelo" style="display:none; padding: 20px; max-width: 500px; margin: auto;">
  <div style="margin-bottom: 16px;">
    <button onclick="voltarAoDashboard()" style="background:none;border:none;color:#154c79;font-size:14px;font-weight:600;cursor:pointer;">← Voltar ao Dashboard</button>
  </div>
  <div style="background-color:#FFD700;padding:15px;border-radius:10px 10px 0 0;text-align:center;">
    <h2 style="color:#422006;">Livro Amarelo - Contatos</h2>
  </div>
  <div style="background:white;padding:20px;border-radius:0 0 10px 10px;box-shadow:0 4px 6px rgba(0,0,0,0.1);">
    <h4 style="margin-bottom:10px;color:#CA8A04;">Identificação</h4>
    <label style="display:block;font-size:13px;font-weight:600;color:#334155;margin-bottom:6px;">CPF *</label>
    <input type="text" id="cont_cpf" class="form-input" placeholder="Digite o CPF"
      onblur="buscarCpfLivroAmarelo()" onkeydown="if(event.key==='Enter'){event.preventDefault();buscarCpfLivroAmarelo(true);}">
    <input type="text" id="cont_sinanIndice" class="form-input" placeholder="Nº do SINAN do Caso Índice" disabled>
    <input type="text" id="cont_prontuario" class="form-input" placeholder="Prontuário" disabled>
    <input type="text" id="cont_nomeContato" class="form-input" placeholder="Nome do Contato" disabled>
    <input type="number" id="cont_idade" class="form-input" placeholder="Idade" disabled>
    <select id="cont_sexo" class="form-input" disabled><option value="">Sexo</option><option value="M">Masculino</option><option value="F">Feminino</option></select>
    <input type="text" id="cont_grauParentesco" class="form-input" placeholder="Grau de Parentesco" disabled>
    <p id="msgBuscaContatos" class="feedback-msg" style="display:none;margin-top:12px;"></p>
    <h4 style="margin-top:20px;margin-bottom:10px;color:#CA8A04;">Exames</h4>
    <input type="text" id="cont_ppdAplicado" class="form-input" placeholder="PPD Aplicado" disabled>
    <input type="text" id="cont_ppdResultado" class="form-input" placeholder="PPD Resultado (mm)" disabled>
    <input type="date" id="cont_dataRaioX" class="form-input" disabled>
    <input type="text" id="cont_resultadoRaioX" class="form-input" placeholder="Resultado do Raio-X" disabled>
    <input type="date" id="cont_data1aBaar" class="form-input" disabled>
    <input type="text" id="cont_resultado1aBaar" class="form-input" placeholder="Resultado da 1ª BAAR" disabled>
    <input type="date" id="cont_dataAntiHiv" class="form-input" disabled>
    <input type="text" id="cont_resultadoHiv" class="form-input" placeholder="Resultado do Teste HIV" disabled>
    <h4 style="margin-top:20px;margin-bottom:10px;color:#CA8A04;">Conduta</h4>
    <input type="text" id="cont_iniciadoTb" class="form-input" placeholder="Iniciado Tratamento Tuberculose" disabled>
    <input type="text" id="cont_iniciadoIltb" class="form-input" placeholder="Iniciado ILTB (Quimioprofilaxia)" disabled>
    <input type="text" id="cont_realizado" class="form-input" placeholder="Realizado" disabled>
    <input type="text" id="cont_orientacao" class="form-input" placeholder="Orientação" disabled>
    <input type="text" id="cont_recusaPaciente" class="form-input" placeholder="Recusa do Paciente" disabled>
    <input type="date" id="cont_data" class="form-input" disabled>
    <button id="btnSalvarLivroAmarelo" onclick="salvarLivroAmarelo()" disabled
      style="width:100%;padding:15px;background:#FFD700;border:none;border-radius:5px;margin-top:20px;font-weight:bold;color:#422006;cursor:pointer;">SALVAR REGISTRO</button>
  </div>
  <div id="modalSucessoContatos" class="modal-overlay-livro-verde" style="display:none;">
    <div class="modal-box-livro-verde">
      <p id="modalSucessoTituloContatos" class="modal-titulo-livro-verde">Registro atualizado com sucesso</p>
      <p id="modalSucessoDetalheContatos" class="modal-detalhe-livro-verde"></p>
      <div class="modal-acoes-livro-verde">
        <button id="btnModalVisualizarContatos" type="button" class="btn-modal-visualizar-livro-verde" style="display:none;">Visualizar</button>
        <button id="btnModalCancelarContatos" type="button" class="btn-modal-cancelar-livro-verde" style="display:none;">Cancelar</button>
        <button id="btnModalSucessoOkContatos" type="button" class="btn-modal-ok-livro-verde">OK</button>
      </div>
    </div>
  </div>
</div>
