<style>

     RESET E VARIÁVEIS GERAIS
     ================================================================== */

  .top-tag { position: absolute; top: 40px; left: 60px; display: flex; align-items: center; gap: 10px; font-weight: 600; font-size: 14px; letter-spacing: 1px; }
  .badge { display: inline-block; border: 1px solid rgba(255, 255, 255, 0.3); padding: 6px 16px; border-radius: 20px; font-size: 12px; margin-bottom: 24px; background: rgba(255, 255, 255, 0.05); }
  .left-panel h1 { font-size: 48px; font-weight: 700; line-height: 1.1; margin-bottom: 8px; }
  .left-panel h1 span { color: #60A5FA; }
  .left-panel p { max-width: 400px; font-size: 15px; line-height: 1.6; color: #D1D5DB; margin-top: 20px; }
  .footer-text { position: absolute; bottom: 40px; left: 60px; font-size: 11px; color: rgba(255, 255, 255, 0.5); }
  .right-panel { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 40px; background-color: #F8FAFC; }
  .login-container { width: 100%; max-width: 380px; }
  .login-container h2 { font-size: 28px; color: #0F172A; margin-bottom: 8px; }
  .login-container > p { font-size: 14px; color: #64748B; margin-bottom: 32px; }
  .form-group { margin-bottom: 24px; }
  .form-group label { display: block; font-size: 13px; font-weight: 600; color: #334155; margin-bottom: 8px; }
  .form-group input { width: 100%; padding: 14px 16px; border: 1px solid #CBD5E1; border-radius: 8px; font-size: 16px; color: #0F172A; transition: all 0.2s; }
  .form-group input:focus { outline: none; border-color: #154c79; box-shadow: 0 0 0 3px rgba(21, 76, 121, 0.1); }
  .btn-login { width: 100%; padding: 14px; background-color: #154c79; color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; transition: background-color 0.2s; }
  .btn-login:hover { background-color: #0f3a5e; }
  .btn-login:disabled { background-color: #94A3B8; cursor: not-allowed; }
  .feedback-msg { display: none; margin-top: 15px; padding: 12px; border-radius: 6px; font-size: 14px; text-align: left; line-height: 1.5; }
  .feedback-msg.feedback-error { display: block !important; background-color: #FEE2E2; color: #991B1B; border: 1px solid #F87171; }
  .msg-ppd-alerta-contatos {
    margin: 8px 0 10px;
    font-size: 14px;
    font-weight: 700;
    color: #B90E0A;
    line-height: 1.4;
  }
  .ppd-resultado-wrapper { width: 100%; }

  /* ==================================================================
     TELA 2: DASHBOARD
     ================================================================== */
  .dashboard-layout { display: none; padding: 40px 5%; max-width: 1400px; margin: 0 auto; animation: fadeIn 0.5s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .dash-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; padding-bottom: 20px; border-bottom: 1px solid #E2E8F0; }
  .user-info h2 { font-size: 24px; color: #0F172A; }
  .user-info p { font-size: 14px; color: #64748B; margin-top: 4px; font-weight: 500; }
  .btn-logout { background: none; border: 1px solid #CBD5E1; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600; color: #475569; }
  .btn-logout:hover { background: #E2E8F0; }
  .modules-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 24px; }

  /* CARTÕES DOS LIVROS */
  .module-card { background: #E2E8F0; border-radius: 16px; padding: 0; cursor: pointer; box-shadow: 0 15px 30px -5px rgba(0, 0, 0, 0.2), 0 8px 10px -6px rgba(0, 0, 0, 0.1); border: 5px solid rgba(255, 255, 255, 0.3); transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); position: relative; overflow: hidden; aspect-ratio: 16 / 10; }

  .module-card:active { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.2); }
  .module-card img { width: 100%; height: 100%; object-fit: cover; display: block; }

  /* ==================================================================
